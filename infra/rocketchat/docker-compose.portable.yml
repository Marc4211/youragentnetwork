# Portable local-profile stack for youragentnetwork.
#
# This is the start of the refactored, portable compose (Refactor Phase 1/4).
# Differences from the original infra/rocketchat/docker-compose.yml:
#   - No Caddy, no cloudflared (those belong to a future `public` ingress
#     profile). This `local` profile binds to loopback only; reach it via SSH
#     tunnel or a Tailscale name. No domain, no certs, no Cloudflare account.
#   - No hardcoded host paths or domains: everything per-deployment is in .env.
#   - OpenClaw is NOT defined here. It is the team's pre-existing, co-located
#     gateway; the glue (added in the next increment) wires into it.
#
# Bring up (on the host):
#   cd infra/rocketchat
#   cp .env.portable.example .env    # then edit
#   docker compose -f docker-compose.portable.yml up -d

services:

  mongodb:
    image: mongo:8.0
    restart: unless-stopped
    command: ["--replSet", "rs0", "--oplogSize", "128"]
    volumes:
      - ./data/mongo:/data/db
    # No host ports. Only other containers on this network reach it.

  mongodb-init:
    image: mongo:8.0
    restart: "no"
    depends_on:
      - mongodb
    entrypoint:
      - bash
      - -c
      - |
        echo "Waiting for MongoDB to accept connections..."
        until mongosh --host mongodb --quiet --eval "db.adminCommand('ping').ok" 2>/dev/null | grep -q 1; do
          sleep 2
        done
        if mongosh --host mongodb --quiet --eval "rs.status().ok" 2>/dev/null | grep -q 1; then
          echo "Replica set already initialized."
        else
          echo "Initializing replica set rs0..."
          mongosh --host mongodb --quiet --eval "rs.initiate({_id: 'rs0', members: [{_id: 0, host: 'mongodb:27017'}]})"
        fi

  rocketchat:
    image: rocketchat/rocket.chat:8.4.2
    restart: unless-stopped
    depends_on:
      - mongodb
    environment:
      # Externally-visible URL. For the local profile this is the loopback URL
      # you reach over an SSH tunnel or Tailscale; override in .env.
      ROOT_URL: ${ROOT_URL:-http://localhost:3000}
      MONGO_URL: mongodb://mongodb:27017/rocketchat?replicaSet=rs0
      MONGO_OPLOG_URL: mongodb://mongodb:27017/local?replicaSet=rs0
      PORT: 3000
      DEPLOY_METHOD: docker
      # First-boot admin (used only if no admin exists yet) so we skip the wizard.
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASS: ${ADMIN_PASS:?set ADMIN_PASS in .env}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      # Defense in depth: only the invite flow should create accounts.
      Accounts_RegistrationForm: ${ACCOUNTS_REGISTRATION_FORM:-Disabled}
    ports:
      # Loopback only. Reach via: ssh -L 3000:127.0.0.1:3000 <host>
      - "${RC_BIND_ADDR:-127.0.0.1}:3000:3000"
    volumes:
      - ./data/uploads:/app/uploads

  # The glue: Rocket.Chat <-> OpenClaw bridge + join flow. Wires into the
  # team's PRE-EXISTING, co-located OpenClaw (we do not run OpenClaw).
  glue:
    build:
      context: ../../glue
    restart: unless-stopped
    depends_on:
      - rocketchat
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # Branding shown on the join page + in agent identity (no vendor branding).
      INSTANCE_NAME: ${INSTANCE_NAME:-Agent Network}
      BRAND_LOGO_URL: ${BRAND_LOGO_URL:-}
      # Invites: gate the join page on a valid token (admin console issues them).
      INVITES_REQUIRED: ${INVITES_REQUIRED:-true}
      # Active ingress profile, so the admin console shows the right join help.
      INGRESS_PROFILE: ${INGRESS_PROFILE:-loopback}
      # Existing OpenClaw gateway (reached over its own docker network).
      OPENCLAW_GATEWAY_URL: ${OPENCLAW_GATEWAY_URL:?set in .env}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:?set in .env}
      # Rocket.Chat (same compose network) + the public URL shown to users.
      ROCKETCHAT_URL: http://rocketchat:3000
      ROCKETCHAT_PUBLIC_URL: ${ROCKETCHAT_PUBLIC_URL:-http://localhost:3000}
      # These are generated by scripts/install.sh and written to .env before the
      # glue is started; empty-default so `compose up rocketchat` (which parses
      # every service) does not fail before they exist.
      BOT_USER_ID: ${BOT_USER_ID:-}
      BOT_PAT: ${BOT_PAT:-}
      BOT_USERNAME: ${BOT_USERNAME:-lois}
      ADMIN_USER_ID: ${ADMIN_USER_ID:-}
      ADMIN_PAT: ${ADMIN_PAT:-}
      # Admin login name (defaults to "admin"); shown on the admin console so the
      # operator knows which account to use for Rocket.Chat administration too.
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      TEAM_CHANNEL_NAME: ${TEAM_CHANNEL_NAME:-general}
      # OpenClaw data dir as the glue sees it (mounted below) and as OpenClaw
      # sees it inside its own container, plus the container name to reload.
      OPENCLAW_DATA_HOST_PATH: /openclaw_data
      OPENCLAW_DATA_OPENCLAW_PATH: ${OPENCLAW_DATA_OPENCLAW_PATH:-/home/node/.openclaw}
      OPENCLAW_CONTAINER_NAME: ${OPENCLAW_CONTAINER_NAME:-openclaw-openclaw-gateway-1}
    # The glue shares the default compose network with Mongo + Rocket.Chat, and
    # reaches OpenClaw (Docker-published port OR native on the host) at
    # http://host.docker.internal:18789 via this host-gateway mapping. No
    # external OpenClaw network is required, so native installs work too.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${GLUE_BIND_ADDR:-127.0.0.1}:8000:8000"
    volumes:
      # Bind-mount the EXISTING OpenClaw's data dir so the join flow can write
      # agent workspaces and edit openclaw.json.
      - ${OPENCLAW_DATA_DIR:?set OPENCLAW_DATA_DIR in .env}:/openclaw_data
      # Reload OpenClaw after config changes (v1 docker-restart strategy).
      - /var/run/docker.sock:/var/run/docker.sock
      # Glue's own SQLite + state.
      - ./data/glue:/data
